# Experiment Configuration
experiment:
  name: "optimizer_comparison"
  seed: 42

# Data Configuration
data:
  n_samples: 300
  in_dims: [13]
  out_dims: [5]
  test_size: 0.2
  data_seeds: [1, 2, 3, 4, 5]

# Global Training Configuration (for settings that apply to ALL runs)
training:
  num_epochs: 20
  shuffle: true
  use_tqdm: true

# Model Configuration
models:
  BinClass:
    model_seed: 100
    loss_function: "CrossEntropyLoss"
  LinReg:
    model_seed: 100
    loss_function: "MSELoss"

# Optimizer Configuration (with specific hyperparameters for each)
optimizers:

  Shampoo:
    enabled: true
    requires_rank: false
    learning_rates: [0.05]
    eps: [0.1]
    batch_size: [1]

  KATE:
    enabled: true
    requires_rank: false
    # --- KATE-specific hyperparameters would go here ---
    learning_rates: [0.01]
    batch_size: [1]
    eps: [0.01]

  AdaGramPS:
    enabled: true
    requires_rank: true
    testing: false
    # --- AdaGramPS-specific hyperparameters ---
    learning_rates: [0.05]
    batch_size: [1]
    eps: [0.5]
    ranks: [1]                         # Ranks specific to this optimizer

  Torch_Adagrad:
    enabled: true
    requires_rank: false
    # --- Torch Adagrad-specific hyperparameters ---
    learning_rates: [0.1]                               # Adagrad often works well with higher LRs
    batch_size: [1]
    eps: [0.01]

  FullAdaGrad:
    enabled: false
    requires_rank: false
    # --- FullAdaGrad-specific hyperparameters ---
    learning_rates: [0.1]
    batch_size: [32]    # change for gradients
    eps: [0.5]

  Vanilla_SGD:
    enabled: true
    requires_rank: false
    # --- SGD-specific hyperparameters (note: no 'eps' or 'ranks') ---
    learning_rates: [0.01]
    batch_size: [1]
    eps: [nan]
  # --- Other optimizers would follow the same pattern ---
  AdaGramFR_svd:
    testing: false
    enabled: false
    requires_rank: true
    learning_rates: [0.01]
    batch_size: [32]
    eps: [0.01]
    ranks: [5, 10]

  AdaGram:
    testing: false
    enabled: false
    requires_rank: false

# Output Configuration
output:
  results_dir: "results"
  plots_dir: "plots"
  gradients_dir: "gradients"

# Tasks Configuration
tasks:
  enabled_tasks: ["BinClass"] # Options: ["BinClass", "LinReg"]

# Dataset Configuration
dataset:
  type: "Heart" # Options: SparseDataset, CorrelatedDataset, LinearDataset, MNIST, AU, Heart
  sparse_config:
    if_class: true
  correlated_config:
    correlation: 0.8
  linear_config:
    noise_std: 0.1
