# Output Configuration
output:
  results_dir: "results"
  plots_dir: "plots"
  gradients_dir: "gradients"

# Tasks Configuration
tasks:
  enabled_tasks: ["BinClass"] # Options: ["BinClass", "LinReg"]

# Dataset Configuration
dataset:
  type: "IsotropicDataset" # Options: SparseDataset, CorrelatedDataset, LinearDataset, MNIST, AU, Heart
  sparse_config:
    if_class: true
  correlated_config:
    correlation: 0.8
  linear_config:
    noise_std: 0.1
