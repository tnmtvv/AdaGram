# Experiment Configuration
experiment:
  name: "optimizer_comparison"
  seed: 42

# Data Configuration
data:
  n_samples: 300
  in_dims: [20]
  out_dims: [2]
  test_size: 0.2
  data_seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 10

# Global Training Configuration (for settings that apply to ALL runs)
training:
  num_epochs: 20
  shuffle: true
  use_tqdm: true

# Model Configuration
models:
  BinClass:
    model_seed: 100
    loss_function: "CrossEntropyLoss"
  LinReg:
    model_seed: 100
    loss_function: "MSELoss"

optimizers:
  FullAdaGrad:
    enabled: true
    requires_rank: false
    # --- FullAdaGrad-specific hyperparameters ---
    learning_rates:
    - 0.01
    batch_size:                          # change for gradients
    - 64
    eps:
    - 1e-05
  # --- Other optimizers would follow the same pattern ---

  AdaGramPS:
    enabled: false
    requires_rank: true
    testing: false
    # --- AdaGramPS-specific hyperparameters ---
    learning_rates: [1e-3, 1e-4, 1e-5, 1e-2]
    batch_size: [1, 32, 64]
    eps: [1e-3, 1e-4, 1e-5, 1e-2, 0.1, 0.5]
    ranks: [1, 2, 3, 4, 5, null]
    alphas: [1.0, 0.2, 0.5, 0.8, 0]

  Shampoo:
    enabled: true
    requires_rank: false
    learning_rates:
    - 0.01
    eps:
    - 0.001
    batch_size:
    - 1

  KATE:
    enabled: true
    requires_rank: false
    # --- KATE-specific hyperparameters would go here ---
    learning_rates:
    - 0.01
    batch_size:
    - 64
    eps:
    - 0.001


  Torch_Adagrad:
    enabled: true
    requires_rank: false
    # --- Torch Adagrad-specific hyperparameters ---
    learning_rates:                                                                                         # Adagrad often works well with higher LRs
    - 0.01
    batch_size:
    - 1
    eps:
    - 0.1

  Vanilla_SGD:
    enabled: true
    requires_rank: false
    # --- SGD-specific hyperparameters (note: no 'eps' or 'ranks') ---
    learning_rates:
    - 0.01
    batch_size:
    - 1
    eps: [nan]


  AdaGramFR_svd:
    enabled: false
    requires_rank: true
    testing: false
    # --- AdaGramPS-specific hyperparameters ---
    learning_rates: [1e-3, 1e-4, 1e-5, 1e-2]
    batch_size: [1, 32, 64]
    eps: [1e-05]
    ranks: [1, 2, 3, 4, 5, null]
