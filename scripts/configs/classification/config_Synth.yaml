# Experiment Configuration
experiment:
  name: "optimizer_comparison"
  seed: 42

# Data Configuration
data:
  n_samples: 300
  in_dims: [20]
  out_dims: [2]
  test_size: 0.2
  data_seeds: [1, 2, 3, 4, 5, 10]

# Global Training Configuration (for settings that apply to ALL runs)
training:
  num_epochs: 20
  shuffle: true
  use_tqdm: true

# Model Configuration
models:
  BinClass:
    model_seed: 100
    loss_function: "CrossEntropyLoss"
  LinReg:
    model_seed: 100
    loss_function: "MSELoss"

# Optimizer Configuration (with specific hyperparameters for each)

optimizers:
  FullAdaGrad:
    enabled: true
    requires_rank: false
    # --- FullAdaGrad-specific hyperparameters ---
    learning_rates: [0.1]
    batch_size: [32]                     # change for gradients
    eps: [0.1]
  # --- Other optimizers would follow the same pattern ---

  AdaGramPS:
    enabled: false
    requires_rank: true
    testing: false
    # --- AdaGramPS-specific hyperparameters ---
    learning_rates: [0.05, 0.01, 0.1]
    batch_size: [1, 32, 64]
    eps: [1e-3, 1e-4, 1e-5, 1e-2, 0.1, 0.5]
    ranks: [1, 2, 3, 4, 5, null]

  Shampoo:
    enabled: true
    requires_rank: false
    learning_rates: [0.1]
    eps: [0.001]
    batch_size: [64]

  KATE:
    enabled: true
    requires_rank: false
    # --- KATE-specific hyperparameters would go here ---
    learning_rates: [0.05]
    batch_size: [1]
    eps: [0.0001]


  Torch_Adagrad:
    enabled: true
    requires_rank: false
    # --- Torch Adagrad-specific hyperparameters ---
    learning_rates: [0.1]                                                                             # Adagrad often works well with higher LRs
    batch_size: [32]
    eps: [0.5]

  Vanilla_SGD:
    enabled: true
    requires_rank: false
    # --- SGD-specific hyperparameters (note: no 'eps' or 'ranks') ---
    learning_rates: [0.05]
    batch_size: [32]
    eps: [nan]
  AdaGramPS rank 1: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.01], batch_size: [1], alphas: [.nan], eps: [0.01], 
      ranks: [1]}
  AdaGramPS_fullrank: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.1], batch_size: [1], alphas: [.nan], eps: [0.5], ranks: [
      null]}
  AdaGramPS rank 2: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.1], batch_size: [1], alphas: [.nan], eps: [0.001], 
      ranks: [2]}
  AdaGramPS rank 5: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.1], batch_size: [1], alphas: [.nan], eps: [0.5], ranks: [
      5]}
  AdaGramPS rank 4: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.1], batch_size: [1], alphas: [.nan], eps: [0.5], ranks: [
      4]}
  AdaGramPS rank 3: {enabled: true, requires_rank: true, testing: false, 
      learning_rates: [0.1], batch_size: [32], alphas: [.nan], eps: [0.5], ranks: [
      3]}

# Output Configuration
output:
  results_dir: "results"
  plots_dir: "plots"
  gradients_dir: "gradients"

# Tasks Configuration
tasks:
  enabled_tasks: ["BinClass"] # Options: ["BinClass", "LinReg"]

# Dataset Configuration
dataset:
  type: "SparseDataset" # Options: SparseDataset, CorrelatedDataset, LinearDataset, MNIST, AU, Heart
  sparse_config:
    if_class: true
  correlated_config:
    correlation: 0.8
  linear_config:
    noise_std: 0.1
